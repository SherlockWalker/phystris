<!DOCTYPE html>
<html>
<head>
    <title>PhysTris</title>
    <link rel="stylesheet" href="/static/index.css">
</head>

<body>

    <header>
        <h1>PhysTris</h1>
    </header>

    <div class="video-container">
        <img src="/video" id="videoFeed">

        <div id="overlay" class="overlay">
            Click to enable camera
        </div>
    </div>

    <div class="panel">
        <button id="cameraBtn" onclick="toggleCamera()">Camera: ON</button>
    </div>

    <script>
        let cameraEnabled = false;
        let cameraReady = false;

        async function toggleCamera() {
            await fetch('/camera/toggle', { method: 'POST' });
            cameraEnabled = !cameraEnabled;

            updateOverlay();
            pollFrameUntilReady();
        }

        async function pollFrameUntilReady() {
            if (!cameraEnabled) return;

            const interval = setInterval(async () => {
                const res = await fetch('/camera/status');
                const data = await res.json();

                if (data.ready) {
                    cameraReady = true;
                    clearInterval(interval);
                    updateOverlay();
                }
            }, 500);
        }

        async function updateOverlay() {
            const overlay = document.getElementById("overlay");

            if (!cameraEnabled) {
                overlay.style.display = "flex";
                overlay.innerText = "Click to enable camera";
                return;
            }

            if (cameraEnabled && !cameraReady) {
                overlay.style.display = "flex";
                overlay.innerText = "Loading camera...";
                return;
            }

            if (cameraReady) {
                overlay.style.display = "none";
            }
        }

        // initial state sync
        (async () => {
            const res = await fetch('/camera/status');
            const data = await res.json();

            cameraEnabled = data.enabled;
            cameraReady = data.has_frame;

            updateOverlay();

            if (cameraEnabled && !cameraReady) {
                pollFrameUntilReady();
            }
        })();
    </script>

</body>
</html>
